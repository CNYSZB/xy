function switchLang(lang) {
  currentLang = lang;
  document.getElementById('content').textContent = contentData[lang];
  document.getElementById('title').textContent = uiText[lang].title;
  document.getElementById('btnDisagree').textContent = uiText[lang].btnDisagree;

  const agreeBtn = document.getElementById('btnAgree');
  const reached = document.getElementById('content').scrollHeight - document.getElementById('content').scrollTop - document.getElementById('content').clientHeight < 2;
  if (!isForceMode) {
    agreeBtn.textContent = uiText[lang].btnClose;
    agreeBtn.classList.add('active');
  } else if (reached) {
    agreeBtn.textContent = uiText[lang].btnAgree;
    agreeBtn.classList.add('active');
  } else {
    agreeBtn.textContent = uiText[lang].btnAgree;
  }

  updateThemeButtonText();
  updateSelectValue();
}

function updateSelectValue() {
  document.getElementById('langSelect').value = currentLang;
}

function updateThemeButtonText() {
  const btn = document.getElementById('themeToggleBtn');
  if (currentTheme === 'dark') {
    btn.textContent = uiText[currentLang].toggleLight;
  } else {
    btn.textContent = uiText[currentLang].toggleDark;
  }
}

document.getElementById('content').addEventListener('scroll', function() {
  if (!isForceMode) return;
  const el = this;
  const reached = el.scrollHeight - el.scrollTop - el.clientHeight < 2;
  if (reached) {
    const btn = document.getElementById('btnAgree');
    btn.classList.add('active');
  }
});

function agreeOrClose() {
  if (isForceMode) {
    const el = document.getElementById('content');
    const reached = el.scrollHeight - el.scrollTop - el.clientHeight < 2;
    if (!reached) return;
    window.parent.postMessage({ type: 'agreementAccepted', version: AGREEMENT_VERSION }, '*');
  } else {
    window.parent.postMessage({ type: 'agreementClosed' }, '*');
  }
}

function disagree() {
  window.parent.postMessage({ type: 'agreementRejected' }, '*');
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setAgreementMode') {
    isForceMode = e.data.force;
    const btn = document.getElementById('btnAgree');
    if (!isForceMode) {
      btn.textContent = uiText[currentLang].btnClose;
      btn.classList.add('active');
